services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: azure-cloud-devops-api:compose
    container_name: azure-cloud-devops-api-compose
    ports:
      - "5001:5000"
    environment:
      SERVICE_NAME: azure-cloud-devops-api
      APP_VERSION: "1.0.0"
      ENVIRONMENT: local-compose
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: azure-cloud-devops-redis
    ports:
      - "6379:6379"
    restart: unless-stopped